# Browse the events list, search by query, open an event, return.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# Search filters the list
- tapOn:
    id: 'events.searchInput'
- inputText: 'Aurora'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_002'
    timeout: 10000

# Clear search
- tapOn:
    id: 'events.searchInput'
- eraseText
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 10000

# Open detail
- tapOn:
    id: 'events.item.evt_001'
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000
- assertVisible:
    id: 'eventDetail.buyButton'

# Back to list
- back
- assertVisible:
    id: 'screen.events'
