# Browse the events list, search by query, open an event, return.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# Wait for events list data to load before search interaction.
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 10000

# Search filters the list
- tapOn:
    id: 'events.searchInput'
- inputText: 'Aurora'
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_002'
    timeout: 10000

# Clear search
- tapOn:
    id: 'events.searchInput'
- eraseText
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 10000

# Open detail
- tapOn:
    id: 'events.item.evt_001'
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000
- assertVisible:
    id: 'eventDetail.buyButton'

# Back to list — `- back` is unreliable on iOS stack screens.
- tapOn:
    point: '8%,7%'
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 5000
