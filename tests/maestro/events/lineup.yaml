# 808 Heatwave Festival ships with a four-act lineup. Open it and
# assert the block + the headliner row.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# evt_003 is sold out — drive via deep link instead of tapping a chip.
- openLink: 'frontrow://events/evt_003'
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000

- assertVisible:
    id: 'eventDetail.lineup'
- assertVisible: 'Lineup'
- assertVisible: 'Neon Drift'
- assertVisible:
    id: 'eventDetail.lineupItem.0'

# The 4th lineup item (the headliner) is below the fold on small phones.
# Assert on the stable testID — text-based assertions fail when scroll
# only just barely reveals the item's bottom edge.
- scrollUntilVisible:
    element:
      id: 'eventDetail.lineupItem.3'
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: 'eventDetail.lineupItem.3'
