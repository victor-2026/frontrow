# Open the inbox via the bell, mark an item as read, then mark all read.
appId: app.frontrow.qa
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.events'
- assertVisible:
    id: 'screen.events'

# Bell appears once signed in. Demo seed has 2 unread notifications;
# the badge fires once the notifications query refreshes after the
# auth-state swap from _setup.yaml.
- assertVisible:
    id: 'events.inboxButton'
- extendedWaitUntil:
    visible:
      id: 'events.inboxBadge'
    timeout: 15000

- tapOn:
    id: 'events.inboxButton'
- assertVisible:
    id: 'screen.inbox'

- assertVisible:
    id: 'inbox.unreadDot.ntf_001'
- assertVisible:
    id: 'inbox.unreadDot.ntf_002'

# Tap the first item — it gets marked read AND navigates to its event.
- tapOn:
    id: 'inbox.item.ntf_001'
- assertVisible:
    id: 'screen.eventDetail'
- back

# One unread left → bell still shows badge.
- assertVisible:
    id: 'events.inboxBadge'

# Mark all read clears the remaining unread.
- tapOn:
    id: 'events.inboxButton'
- tapOn:
    id: 'inbox.markAllReadButton'
- assertNotVisible:
    id: 'inbox.unreadDot.ntf_002'

- back
- assertNotVisible:
    id: 'events.inboxBadge'
