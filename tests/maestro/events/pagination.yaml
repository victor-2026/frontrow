# Apply many_events scenario, scroll the events list to the end, assert end-of-list.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# Seed 200+ events for the list-perf scenario.
- openLink: 'frontrow://debug/seed/many_events'
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn: 'Open'

- tapOn:
    id: 'tab.events'
- assertVisible:
    id: 'screen.events'
- assertVisible:
    id: 'events.list'

# Page 1 has 20 events; page 2 has the remaining 5 (many_events seeds
# 25 total). A handful of swipes is enough to load page 2 and reach
# the end-of-list marker.
- repeat:
    times: 8
    commands:
      - swipe:
          from:
            id: 'events.list'
          direction: UP
      - waitForAnimationToEnd:
          timeout: 1500

- extendedWaitUntil:
    visible:
      id: 'events.endOfList'
    timeout: 10000
