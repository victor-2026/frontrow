# Open an event that ships with a refund policy and assert the block renders.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# Demo seed: evt_001 (Midnight Howl) ships with a refundableUntil + note.
- tapOn:
    id: 'events.item.evt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000

# Refund policy is near the bottom of the event detail page.
# Assert on the stable testID — scrollUntilVisible only guarantees
# the testID'd element is in the viewport, not every text inside it.
- scrollUntilVisible:
    element:
      id: 'eventDetail.refundPolicy'
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: 'eventDetail.refundPolicy'
