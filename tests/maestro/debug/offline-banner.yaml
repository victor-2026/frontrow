# Toggle offline mode from debug, expect the banner and a failing list.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- openLink: 'frontrow://debug/forceError/offline'

- assertVisible:
    id: 'app.offlineBanner'

# Events list now fails — error message replaces the data.
- tapOn:
    id: 'tab.events'
- assertVisible:
    id: 'events.errorMessage'

# Restore connectivity and the banner disappears.
- openLink: 'frontrow://debug/forceError/none'
- assertNotVisible:
    id: 'app.offlineBanner'
