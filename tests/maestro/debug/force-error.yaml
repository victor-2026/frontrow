# Toggle the Force-Error switch to 5xx, then verify the events list shows the error state.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- tapOn:
    id: 'tab.debug'
- assertVisible:
    id: 'screen.debug'
- scrollUntilVisible:
    element:
      id: 'debug.forceError.5xx'
    direction: DOWN
- tapOn:
    id: 'debug.forceError.5xx'

- tapOn:
    id: 'tab.events'
- extendedWaitUntil:
    visible:
      id: 'events.errorMessage'
    timeout: 10000
- assertVisible:
    id: 'events.retryButton'

# Clear the force-error and tap Retry — the list should populate.
- tapOn:
    id: 'tab.debug'
- scrollUntilVisible:
    element: 'None'
    direction: UP
    timeout: 5000
- tapOn: 'None'
- tapOn:
    id: 'tab.events'
- tapOn:
    id: 'events.retryButton'
- extendedWaitUntil:
    visible:
      id: 'events.list'
    timeout: 10000
