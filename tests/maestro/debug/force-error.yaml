# Toggle the Force-Error switch to 5xx, then verify the events list shows the error state.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

# Set forceError via deep link (no scroll needed). The deep link
# routes through Linking → useDeepLinkScenario → setForceError +
# invalidateQueries. waitForAnimationToEnd gives that chain a moment
# to propagate before we drive the UI.
- openLink: 'frontrow://debug/forceError/5xx'
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: 'tab.events'
- extendedWaitUntil:
    visible:
      id: 'events.errorMessage'
    timeout: 10000
- assertVisible:
    id: 'events.retryButton'

# Clear forceError and tap Retry — the list should populate.
- openLink: 'frontrow://debug/forceError/none'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'events.retryButton'
- extendedWaitUntil:
    visible:
      id: 'events.list'
    timeout: 10000
