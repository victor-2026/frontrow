# Toggle the paymentTimeout failure trigger via the Debug screen,
# attempt a purchase, expect the deterministic timeout error.
#
# tag: android-only — on iOS, both the deep-link path
# (Linking.addEventListener doesn't reliably re-deliver to a foregrounded app)
# and the toggle path (scrollUntilVisible can't reach the failure-triggers
# section, native UISwitch testIDs are not exposed) fail. Trigger application
# is unit-tested in src/state/__tests__/qa.test.ts and
# src/hooks/__tests__/usePurchaseTicket.test.tsx.
appId: app.frontrow.qa
tags:
  - android-only
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.debug'
- assertVisible:
    id: 'screen.debug'
# Switch testID doesn't always surface on iOS (native UISwitch nested under
# a Row); scroll by the row text label and tap by accessibility label.
- scrollUntilVisible:
    element:
      text: 'Payment timeout'
    direction: DOWN
    timeout: 5000
- tapOn: 'Payment timeout'

- tapOn:
    id: 'tab.events'
- tapOn:
    id: 'events.item.evt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000

- tapOn:
    id: 'eventDetail.buyButton'
- assertVisible:
    id: 'screen.buyTicket'

- tapOn:
    id: 'buyTicket.payButton'
- extendedWaitUntil:
    visible: 'Payment processor timed out. Please try again.'
    timeout: 10000

# Clean up so subsequent flows are unaffected.
- tapOn:
    id: 'tab.debug'
- scrollUntilVisible:
    element:
      text: 'Payment timeout'
    direction: DOWN
    timeout: 5000
- tapOn: 'Payment timeout'
