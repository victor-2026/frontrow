# Apply a seed scenario via deep link, then verify the app reflects it.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true

# Sign in first
- runFlow: ../_setup.yaml

# Apply expired_tickets via debug deep link.
- openLink: 'frontrow://debug/seed/expired_tickets'
# iOS may show a system "Open in <App>?" confirmation when opening a custom-scheme
# URL while another app is foregrounded. Dismiss it if present.
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn: 'Open'

# Give the deep link's setScenario + invalidateQueries chain a moment
# before navigating — otherwise the tickets-mine query refetch races
# with the tab switch.
- waitForAnimationToEnd:
    timeout: 2000

# Open My Tickets and verify the status shows used on every ticket.
- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'
- assertVisible:
    id: 'myTickets.item.tkt_001'
- assertVisible:
    id: 'myTickets.item.tkt_002'
- assertNotVisible: 'active'
