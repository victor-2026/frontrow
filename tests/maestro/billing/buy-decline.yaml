# Set IAP outcome to Decline via the QA Debug menu, then buy and confirm the failure UI.
appId: app.frontrow.qa
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.debug'
- assertVisible:
    id: 'screen.debug'
- scrollUntilVisible:
    element:
      id: 'debug.iap.decline'
    direction: DOWN
    timeout: 30000
    speed: 30
- tapOn:
    id: 'debug.iap.decline'

- tapOn:
    id: 'tab.profile'
- tapOn:
    id: 'profile.premiumButton'
- assertVisible:
    id: 'screen.premium'

- tapOn:
    id: 'premium.buy.frontrow.vip.upgrade'
- assertVisible:
    id: 'billing.sheet'
- tapOn:
    id: 'billing.sheet.confirm'

- assertVisible: 'Purchase failed'
- tapOn: 'OK'
