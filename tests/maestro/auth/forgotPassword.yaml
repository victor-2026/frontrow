# Forgot password recovery: request OTP, enter code, set a new password.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- tapOn:
    id: 'tab.profile'
- assertVisible:
    id: 'screen.profile'
- tapOn:
    id: 'profile.signInButton'
- assertVisible:
    id: 'screen.login'

# Request a reset code
- tapOn:
    id: 'login.forgotPasswordLink'
- assertVisible:
    id: 'screen.forgotPassword'
- tapOn:
    id: 'forgotPassword.emailInput'
- eraseText
- inputText: 'demo@frontrow.app'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'forgotPassword.submitButton'

# OTP entry — demo code is 123456
- assertVisible:
    id: 'screen.otp'
- tapOn:
    id: 'otp.codeInput'
- inputText: '123456'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'otp.submitButton'

# Reset password
- assertVisible:
    id: 'screen.resetPassword'
- tapOn:
    id: 'resetPassword.newPasswordInput'
- inputText: 'newpass1234'
- tapOn:
    id: 'resetPassword.confirmPasswordInput'
- inputText: 'newpass1234'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'resetPassword.submitButton'

- extendedWaitUntil:
    visible:
      id: 'resetPassword.successMessage'
    timeout: 15000
