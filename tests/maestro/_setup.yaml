# Shared E2E setup. Use via:
#   - runFlow: ../_setup.yaml
#
# Replaces the cold-boot + onboarding-skip + login dance with a single
# deep link that pre-auths the demo user, marks onboarding done, resets
# mock state, and clears all failure triggers.
#
# Use this in flows that need an authenticated, deterministic starting
# state. For flows that specifically test cold launch or the onboarding
# UI itself, keep the explicit launchApp/clearState pattern.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true

# Пропустить onboarding (Android fresh install показывает onboarding)
- runFlow:
    when:
      visible:
        id: 'onboarding.skipButton'
    commands:
      - tapOn:
          id: 'onboarding.skipButton'
      - tapOn:
          id: 'onboarding.skipButton'

- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 25000

# Deep link — seed data + sign in (iOS: works, Android: игнорируется)
- openLink: 'frontrow://e2e/setup'

# iOS Release builds show "Open in FrontRow?" prompt — dismiss it
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn: 'Open'

# Fallback: если deep link не сработал (Android) — логинимся через UI
- runFlow:
    when:
      notVisible:
        id: 'events.item.evt_001'
    commands:
      - tapOn:
          id: 'tab.profile'
      - runFlow:
          when:
            visible:
              id: 'screen.profile'
          commands:
            - tapOn:
                id: 'profile.signInButton'
            - runFlow:
                when:
                  visible:
                    id: 'screen.login'
                commands:
                  - tapOn:
                      id: 'login.submitButton'
                  - extendedWaitUntil:
                      visible:
                        id: 'profile.signOutButton'
                      timeout: 15000
      - tapOn:
          id: 'tab.events'

# Wait for auth confirmed (inboxButton = signed in)
- extendedWaitUntil:
    visible:
      id: 'events.inboxButton'
    timeout: 10000

# Wait for any events to appear (real or seeded)
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 15000
