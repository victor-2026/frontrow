# Shared E2E setup. Use via:
#   - runFlow: ../_setup.yaml
#
# Replaces the cold-boot + onboarding-skip + login dance with a single
# deep link that pre-auths the demo user, marks onboarding done, resets
# mock state, and clears all failure triggers.
#
# Use this in flows that need an authenticated, deterministic starting
# state. For flows that specifically test cold launch or the onboarding
# UI itself, keep the explicit launchApp/clearState pattern.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- openLink: 'frontrow://e2e/setup'

# iOS Release builds prompt "Open in FrontRow?" when openLink hits a
# different URL scheme than the one the app was originally launched
# with. Dismiss the prompt if it appears. Debug builds and Android
# do not show this dialog, so the runFlow guard makes it a no-op.
- runFlow:
    when:
      visible: 'Open'
    commands:
      - tapOn: 'Open'

# Wait for the auth state to actually propagate. events.inboxButton
# only renders when isSignedIn is true — using it as the
# "fast-boot complete" gate prevents downstream flows from racing
# the auth+query refresh cascade triggered by the deep link.
- extendedWaitUntil:
    visible:
      id: 'events.inboxButton'
    timeout: 5000
- assertVisible:
    id: 'screen.events'

# Wait for events list data to actually load before handing control
# to downstream flows. Without this gate every flow that opens an
# event detail has to race the React Query refetch triggered by
# the e2e/setup deep link.
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 10000
