# Open the bridged native demo screen, exercise the increment counter,
# close it. Validates the testID contract carries from the JS-driven
# shell through into the Swift UIViewController and Kotlin Activity.
appId: app.frontrow.qa
---
- launchApp
- extendedWaitUntil:
    visible:
      id: 'tab.debug'
    timeout: 20000

- tapOn:
    id: 'tab.debug'
- assertVisible:
    id: 'screen.debug'

- scrollUntilVisible:
    element:
      id: 'debug.openNativeDemo'
    direction: DOWN
- tapOn:
    id: 'debug.openNativeDemo'

- extendedWaitUntil:
    visible:
      id: 'screen.nativeDemo'
    timeout: 5000
- assertVisible:
    id: 'screen.nativeDemo'
- assertVisible:
    id: 'nativeDemo.title'
- assertVisible:
    id: 'nativeDemo.body'
- assertVisible:
    id: 'nativeDemo.counter'
- assertVisible:
    id: 'nativeDemo.incrementButton'

- tapOn:
    id: 'nativeDemo.incrementButton'
- tapOn:
    id: 'nativeDemo.incrementButton'
- assertVisible:
    id: 'nativeDemo.counter'

- tapOn:
    id: 'nativeDemo.closeButton'
- assertVisible:
    id: 'screen.debug'
