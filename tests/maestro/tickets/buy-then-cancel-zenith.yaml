appId: app.frontrow.qa
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.events'
- assertVisible:
    id: 'screen.events'

- assertVisible:
    id: 'events.item.evt_001'
- swipe:
    from:
      id: 'events.list'
    direction: UP
    duration: 500
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_005'
    timeout: 10000
- tapOn:
    id: 'events.item.evt_005'
- assertVisible:
    id: 'screen.eventDetail'

- tapOn:
    id: 'eventDetail.buyButton'
- assertVisible:
    id: 'screen.buyTicket'
- assertVisible:
    id: 'buyTicket.totalAmount'
- tapOn:
    id: 'buyTicket.payButton'
- assertVisible: 'Ticket purchased'

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'

- extendedWaitUntil:
    visible:
      id: 'myTickets.list'
    timeout: 10000

- tapOn:
    id: 'myTickets.item.tkt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.ticketDetail'
    timeout: 5000

- extendedWaitUntil:
    visible: 'Cancel ticket'
    timeout: 5000
- tapOn: 'Cancel ticket'

- extendedWaitUntil:
    visible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 3000
- tapOn:
    id: 'ticketDetail.cancelConfirmYes'

- assertVisible: 'refund pending'
