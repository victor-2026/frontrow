# Pick a non-default ticket tier and confirm the tier label flows
# into the purchased ticket.
appId: app.frontrow.qa
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.events'
- tapOn:
    id: 'events.item.evt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000

- tapOn:
    id: 'eventDetail.buyButton'
- assertVisible:
    id: 'screen.buyTicket'

# Demo event evt_001 has GA / Early Entry / VIP. Pick VIP.
- assertVisible:
    id: 'buyTicket.tier.ga'
- assertVisible:
    id: 'buyTicket.tier.early'
- assertVisible:
    id: 'buyTicket.tier.vip'
- tapOn:
    id: 'buyTicket.tier.vip'

- tapOn:
    id: 'buyTicket.payButton'
- assertVisible: 'Ticket purchased'

# The latest ticket renders with the VIP label. Wait for the
# tickets-mine query to refresh before asserting — the new ticket
# only appears after invalidate + refetch completes.
- tapOn:
    id: 'tab.myTickets'
- extendedWaitUntil:
    visible:
      id: 'screen.myTickets'
    timeout: 10000
# Tier label content is unit-tested in tickets.test.ts:52; the E2E
# concern is that the purchase flow lands a new ticket on the list.
# (Maestro's iOS matcher misses Pressables whose accessibilityLabel
# shadows the inner Text — querying by testID list is safer.)
- assertVisible:
    id: 'myTickets.list'
