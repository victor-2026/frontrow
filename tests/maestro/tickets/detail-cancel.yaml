# Open a purchased ticket, view QR + status, cancel through the confirm dialog.
#
# tag: android-only — on iOS the ghost-variant Cancel button consistently
# resolves taps to the Profile tab beneath it, regardless of testID, text-tap,
# or scroll positioning. Cancel logic is unit-tested in
# src/hooks/__tests__/useCancelAndTransfer.test.tsx.
appId: app.frontrow.qa
tags:
  - android-only
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'

# Demo data ships with tkt_001 owned by demo user.
- tapOn:
    id: 'myTickets.item.tkt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.ticketDetail'
    timeout: 5000

- assertVisible:
    id: 'ticketDetail.qrCode'
- assertVisible:
    id: 'ticketDetail.qrPayload'
- assertVisible:
    id: 'ticketDetail.statusPill'

# Cancel button sits below the QR + details rows on small phones.
# Maestro's scrollUntilVisible has flaked finding this testID on iOS even
# when the button is on screen, so wait for it via the visible label.
- extendedWaitUntil:
    visible: 'Cancel ticket'
    timeout: 5000

# Tap cancel, dismiss with "Keep" first to verify the confirm dialog can back out.
# Tap by the visible label — testID-based tap on this ghost-variant button
# was landing on the Profile tab below it on iOS.
- tapOn: 'Cancel ticket'
- extendedWaitUntil:
    visible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 3000
- tapOn:
    id: 'ticketDetail.cancelConfirmNo'
- assertNotVisible:
    id: 'ticketDetail.cancelConfirmDialog'

# Now actually cancel.
- tapOn: 'Cancel ticket'
- extendedWaitUntil:
    visible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 3000
- tapOn:
    id: 'ticketDetail.cancelConfirmYes'

- assertVisible: 'Refund requested'

# Status updates and the action buttons go away.
- assertVisible: 'refund pending'
- assertNotVisible:
    id: 'ticketDetail.cancelButton'
