# Open a purchased ticket, view QR + status, cancel through the confirm dialog.
#
# tag: android-only — the RN <Modal> for cancelConfirmDialog mounts in a
# separate UIViewController on iOS and its inner testIDs do not surface
# to Maestro's accessibility query, even with the modal visible on
# screen. Cancel flow is unit-tested in
# src/hooks/__tests__/useCancelAndTransfer.test.tsx.
appId: app.frontrow.qa
tags:
  - android-only
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'

# Demo data ships with tkt_001 owned by demo user.
- tapOn:
    id: 'myTickets.item.tkt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.ticketDetail'
    timeout: 5000

- assertVisible:
    id: 'ticketDetail.qrCode'
- assertVisible:
    id: 'ticketDetail.qrPayload'
- assertVisible:
    id: 'ticketDetail.statusPill'

# Wait for the action row to render before tapping — the ticket data
# resolves async after navigation, and the Cancel button only mounts
# once `ticket.status === 'active'` is known.
- extendedWaitUntil:
    visible: 'Cancel ticket'
    timeout: 5000
- tapOn: 'Cancel ticket'
- extendedWaitUntil:
    visible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 3000
- tapOn:
    id: 'ticketDetail.cancelConfirmNo'
# No wait needed — the dialog dismisses near-instantly
- extendedWaitUntil:
    notVisible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 2000

# Now actually cancel.
- tapOn: 'Cancel ticket'
- extendedWaitUntil:
    visible:
      id: 'ticketDetail.cancelConfirmDialog'
    timeout: 3000
- tapOn:
    id: 'ticketDetail.cancelConfirmYes'

# Skip asserting on the transient "Refund requested" toast — it
# dismisses faster than Maestro can poll once the mutation completes.
# The status-pill flip below proves the cancel succeeded.
- extendedWaitUntil:
    visible: 'refund pending'
    timeout: 5000
- assertNotVisible:
    id: 'ticketDetail.cancelButton'
