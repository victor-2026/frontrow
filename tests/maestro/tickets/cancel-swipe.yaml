appId: app.frontrow.qa
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'

- swipe:
    from:
      id: 'myTickets.item.tkt_001'
    direction: LEFT
    duration: 500
- extendedWaitUntil:
    visible:
      id: 'myTickets.swipeCancel.tkt_001'
    timeout: 5000
- tapOn:
    id: 'myTickets.swipeCancel.tkt_001'

# Confirm dialog — iOS: text, Android: testID (RN Modal)
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Cancel ticket'
          timeout: 5000
      - tapOn: 'Cancel ticket'
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            id: 'ticketDetail.cancelConfirmDialog'
          timeout: 3000
      - tapOn:
          id: 'ticketDetail.cancelConfirmYes'

- extendedWaitUntil:
    visible: 'refund pending'
    timeout: 5000
