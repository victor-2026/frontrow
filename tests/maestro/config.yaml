# Maestro workspace config — picked up automatically when you run
# `maestro test tests/maestro/`. Limit to one-deep glob so this file
# (and future top-level helpers) aren't picked up as flows.
flows:
  - 'auth/*.yaml'
  - 'billing/*.yaml'
  - 'capabilities/*.yaml'
  - 'debug/*.yaml'
  - 'events/*.yaml'
  - 'smoke/*.yaml'
  - 'tickets/*.yaml'

# Disable system animations so taps don't land mid-transition. This is the
# single biggest reliability win — it removes a whole class of races.
platform:
  android:
    disableAnimations: true
  ios:
    disableAnimations: true

executionOrder:
  flowsOrder:
    - smoke/launch
    - smoke/onboarding-complete
    - smoke/onboarding-skip
    - events/browse
    - events/genre-filter
    - events/sort
    - events/recently-viewed
    - events/refund-policy
    - events/lineup
    - events/pagination
    - auth/login
    - auth/forgotPassword
    - auth/recovery-deeplinks
    - auth/edit-profile
    - auth/language-switch
    - tickets/buy
    - tickets/tier-select
    - tickets/detail-cancel
    - tickets/swipe-cancel
    - tickets/transfer
    - events/reviews
    - events/favorites
    - events/follow-artist
    - events/inbox
    - billing/buy-success
    - billing/buy-decline
    - billing/payment-methods-crud
    - debug/scenario-deep-link
    - debug/force-error
    - debug/offline-banner
    - debug/failure-trigger
    - capabilities/haptic
