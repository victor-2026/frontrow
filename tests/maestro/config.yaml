# Maestro workspace config — picked up automatically when you run
# `maestro test tests/maestro/`. Limit to one-deep glob so this file
# (and future top-level helpers) aren't picked up as flows.
flows:
  - 'auth/*.yaml'
  - 'billing/*.yaml'
  - 'capabilities/*.yaml'
  - 'debug/*.yaml'
  - 'events/*.yaml'
  - 'smoke/*.yaml'
  - 'tickets/*.yaml'
executionOrder:
  flowsOrder:
    - smoke/launch
    - events/browse
    - auth/login
    - tickets/buy
    - billing/buy-success
    - billing/buy-decline
    - debug/scenario-deep-link
    - debug/force-error
    - capabilities/haptic
