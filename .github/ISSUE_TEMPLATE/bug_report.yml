name: Bug report
description: Something in FrontRow is broken
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug.
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: iOS 17.5 simulator, Pixel 6 emulator, Expo SDK 54, etc.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
